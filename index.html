<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxAI Studio - Professional TTS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#0c0c0e',
                        surface: '#161618',
                        primary: '#6366f1',
                        'primary-light': '#818cf8',
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body { background-color: #0c0c0e; color: #e4e4e7; margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; -webkit-font-smoothing: antialiased; }
        
        .glass-panel { background: rgba(22, 22, 24, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; }
        
        /* Premium Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 20px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        
        /* Precise Inputs */
        input[type="range"] { -webkit-appearance: none; height: 4px; background: #27272a; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #6366f1; border-radius: 50%; cursor: pointer; border: 2px solid #0c0c0e; box-shadow: 0 0 10px rgba(99, 102, 241, 0.3); }
        
        /* Animations */
        @keyframes subtle-float { 0% { transform: translateY(0); } 50% { transform: translateY(-2px); } 100% { transform: translateY(0); } }
        .float { animation: subtle-float 3s ease-in-out infinite; }
        
        .transition-solid { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .button-glow:hover { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
        
        .active-dot { width: 6px; height: 6px; background: #6366f1; border-radius: 50%; box-shadow: 0 0 8px #6366f1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 18, className = "", fill = "none" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }} fill={fill}></i>;
        };

        const SidebarItem = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center justify-between px-4 py-3 rounded-xl transition-solid group ${active ? 'bg-white/[0.04] text-white' : 'text-zinc-500 hover:text-zinc-200 hover:bg-white/[0.02]'}`}>
                <div className="flex items-center gap-3">
                    <Icon name={icon} size={18} className={active ? 'text-primary' : 'group-hover:text-zinc-200'} />
                    <span className="font-semibold text-[13px] tracking-tight">{label}</span>
                </div>
                {active && <div className="active-dot" />}
            </button>
        );

        const ControlSlider = ({ label, value, min, max, step, onChange, icon }) => (
            <div className="space-y-3 glass-card p-4 hover:bg-white/[0.04] transition-solid">
                <div className="flex justify-between items-center">
                    <div className="flex items-center gap-2 text-zinc-400">
                        <Icon name={icon} size={14} className="text-zinc-500" />
                        <span className="text-xs font-bold uppercase tracking-wider opacity-70">{label}</span>
                    </div>
                    <span className="text-primary font-mono text-xs font-bold bg-primary/10 px-2 py-0.5 rounded">{value.toFixed(1)}</span>
                </div>
                <input type="range" min={min} max={max} step={step} value={value} onChange={(e) => onChange(parseFloat(e.target.value))} className="w-full cursor-pointer" />
            </div>
        );

        function App() {
            const [text, setText] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [progress, setProgress] = useState(0);
            const [language, setLanguage] = useState('EN');
            const [voice, setVoice] = useState('Male 1');
            const [speed, setSpeed] = useState(1.0);
            const [pitch, setPitch] = useState(1.0);
            const [volume, setVolume] = useState(0.8);
            const [activeTab, setActiveTab] = useState('generate');
            const [batchMode, setBatchMode] = useState(false);
            const [batchItems, setBatchItems] = useState(['']);
            const [fileName, setFileName] = useState('Studio_Export_01');
            const [isPlaying, setIsPlaying] = useState(false);
            const [showSuccess, setShowSuccess] = useState(false);
            
            const synth = window.speechSynthesis;

            useEffect(() => { 
                lucide.createIcons();
                const loadVoices = () => synth.getVoices();
                loadVoices();
                if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
            }, []);

            const handleGenerate = () => {
                const textToSpeak = batchMode ? batchItems.join('. ') : text;
                if (!textToSpeak.trim()) return;

                setIsGenerating(true);
                setProgress(0);
                setShowSuccess(false);

                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                const voices = synth.getVoices();
                const langCode = language === 'BN' ? 'bn' : 'en';
                const matchedVoice = voices.find(v => v.lang.toLowerCase().includes(langCode) && 
                    (voice.includes('Female') ? (v.name.includes('Female') || v.name.includes('Zira') || v.name.includes('Google')) : true));
                
                if (matchedVoice) utterance.voice = matchedVoice;
                utterance.rate = speed;
                utterance.pitch = pitch;
                utterance.volume = volume;

                utterance.onstart = () => {
                    let p = 0;
                    const interval = setInterval(() => {
                        p += 2;
                        if (p >= 100) clearInterval(interval);
                        setProgress(Math.min(p, 99));
                    }, 50);
                };

                utterance.onend = () => {
                    setProgress(100);
                    setIsGenerating(false);
                    setIsPlaying(false);
                    setShowSuccess(true);
                    setTimeout(() => setShowSuccess(false), 3000);
                };

                utterance.onerror = () => setIsGenerating(false);

                synth.cancel();
                synth.speak(utterance);
                setIsPlaying(true);
            };

            const handlePlayPause = () => {
                if (synth.speaking) {
                    if (synth.paused) { synth.resume(); setIsPlaying(true); } 
                    else { synth.pause(); setIsPlaying(false); }
                } else { handleGenerate(); }
            };

            return (
                <div className="flex h-screen bg-background text-zinc-300 overflow-hidden select-none">
                    {/* Sidebar */}
                    <aside className="w-72 border-r border-white/5 flex flex-col p-6 bg-surface/30">
                        <div className="flex items-center gap-3 mb-12 px-2">
                            <div className="w-11 h-11 bg-primary rounded-2xl flex items-center justify-center text-white shadow-xl shadow-primary/20 float">
                                <Icon name="mic" size={24} />
                            </div>
                            <div>
                                <h1 className="font-extrabold text-xl tracking-tight text-white">VoxAI</h1>
                                <div className="flex items-center gap-1.5">
                                    <div className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse" />
                                    <span className="text-[10px] text-zinc-500 uppercase tracking-[0.2em] font-bold">Studio Active</span>
                                </div>
                            </div>
                        </div>
                        
                        <nav className="flex-1 space-y-2">
                            <SidebarItem icon="layout-dashboard" label="Audio Studio" active={activeTab === 'generate'} onClick={() => setActiveTab('generate')} />
                            <SidebarItem icon="layers" label="Batch Processing" active={activeTab === 'batch'} onClick={() => { setActiveTab('batch'); setBatchMode(true); }} />
                            <SidebarItem icon="history" label="Library" active={activeTab === 'history'} onClick={() => setActiveTab('history')} />
                        </nav>

                        <div className="mt-auto glass-card p-4">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-[10px] font-bold text-zinc-500 uppercase">Pro Plan</span>
                                <span className="text-[10px] font-bold text-primary">85%</span>
                            </div>
                            <div className="w-full h-1 bg-zinc-800 rounded-full overflow-hidden">
                                <div className="h-full bg-primary" style={{ width: '85%' }} />
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col min-w-0 bg-gradient-to-br from-background to-surface/20">
                        <header className="h-20 border-b border-white/5 flex items-center justify-between px-10 bg-surface/10 backdrop-blur-xl sticky top-0 z-10">
                            <div className="flex items-center gap-6">
                                <div className="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-white/[0.03] border border-white/5">
                                    <Icon name="folder" size={14} className="text-zinc-500" />
                                    <span className="text-xs font-semibold text-zinc-500 tracking-wide">Projects /</span>
                                    <input value={fileName} onChange={(e) => setFileName(e.target.value)} className="bg-transparent border-none text-xs font-bold text-white w-40 outline-none" />
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-4">
                                <div className="flex bg-zinc-900/50 p-1 rounded-xl border border-white/5 shadow-inner">
                                    {['BN', 'EN'].map(l => (
                                        <button key={l} onClick={() => setLanguage(l)} className={`px-4 py-1.5 text-xs font-extrabold rounded-lg transition-solid ${language === l ? 'bg-primary text-white shadow-lg shadow-primary/20' : 'text-zinc-500 hover:text-zinc-300'}`}>{l}</button>
                                    ))}
                                </div>
                                <button className="w-10 h-10 rounded-xl flex items-center justify-center bg-white/[0.03] border border-white/5 text-zinc-400 hover:text-white transition-solid"><Icon name="bell" size={18} /></button>
                                <div className="w-10 h-10 rounded-xl bg-primary/20 border border-primary/20 flex items-center justify-center overflow-hidden">
                                    <img src="https://ui-avatars.com/api/?name=Vox+AI&background=6366f1&color=fff" className="w-full h-full object-cover" />
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 flex overflow-hidden">
                            {/* Editor Area */}
                            <div className="flex-1 flex flex-col p-10 overflow-y-auto">
                                <div className="max-w-4xl w-full mx-auto space-y-8">
                                    <div className="flex items-center justify-between">
                                        <div>
                                            <h3 className="text-2xl font-extrabold text-white tracking-tight">Script Editor</h3>
                                            <p className="text-sm text-zinc-500 mt-1">Write or paste your content to transform it into voice.</p>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <button onClick={() => setText('')} className="flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-bold text-zinc-400 hover:text-red-400 transition-solid bg-white/[0.02] border border-white/5 hover:border-red-400/20"><Icon name="trash-2" size={14} /> Clear All</button>
                                        </div>
                                    </div>

                                    {!batchMode ? (
                                        <div className="relative group">
                                            <div className="absolute -inset-1 bg-gradient-to-r from-primary/10 to-transparent rounded-[26px] opacity-0 group-focus-within:opacity-100 transition-solid duration-500" />
                                            <textarea placeholder={language === 'BN' ? "এখানে টেক্সট লিখুন..." : "Your professional script goes here..."} value={text} onChange={(e) => setText(e.target.value)}
                                                className="relative w-full min-h-[450px] bg-surface/50 border-2 border-white/5 rounded-[24px] p-8 text-lg leading-relaxed focus:outline-none focus:border-primary/50 transition-solid shadow-2xl placeholder:text-zinc-700" />
                                            <div className="absolute bottom-6 right-8 px-3 py-1 rounded-lg bg-zinc-900 border border-white/5 text-[10px] font-bold text-zinc-500 font-mono tracking-widest">{text.length} <span className="opacity-30">/ 5000</span></div>
                                        </div>
                                    ) : (
                                        <div className="space-y-6">
                                            {batchItems.map((item, idx) => (
                                                <div key={idx} className="relative flex gap-6 items-start fade-in group">
                                                    <div className="w-10 h-10 rounded-2xl bg-zinc-900 border border-white/5 flex-shrink-0 flex items-center justify-center text-xs font-bold text-primary shadow-lg">{idx+1}</div>
                                                    <div className="flex-1 relative">
                                                        <textarea value={item} onChange={(e) => { const n = [...batchItems]; n[idx] = e.target.value; setBatchItems(n); }} placeholder={`Segment ${idx + 1}...`}
                                                            className="w-full bg-surface/50 border border-white/5 rounded-2xl p-5 min-h-[120px] focus:outline-none focus:border-primary transition-solid resize-none shadow-xl" />
                                                        <button onClick={() => setBatchItems(batchItems.filter((_, i) => i !== idx))} className="absolute top-4 right-4 p-2 rounded-lg bg-zinc-900 text-zinc-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-solid"><Icon name="x" size={14} /></button>
                                                    </div>
                                                </div>
                                            ))}
                                            <button onClick={() => setBatchItems([...batchItems, ''])} className="w-full py-6 border-2 border-dashed border-white/5 rounded-[24px] text-zinc-500 hover:text-primary hover:border-primary/30 hover:bg-primary/5 transition-solid flex items-center justify-center gap-3 font-bold text-sm"><Icon name="plus" size={18} /> Add New Segment</button>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Sidebar Controls */}
                            <div className="w-96 flex flex-col p-10 border-l border-white/5 bg-surface/10 space-y-10 overflow-y-auto">
                                <section className="space-y-6">
                                    <h4 className="text-[10px] font-black text-zinc-600 uppercase tracking-[0.3em] flex items-center gap-2"><Icon name="music" size={12} /> Voice Engine</h4>
                                    <div className="space-y-4">
                                        <div className="relative">
                                            <select value={language} onChange={(e) => setLanguage(e.target.value)} className="w-full bg-zinc-900/80 border border-white/5 rounded-xl px-4 py-3.5 text-xs font-bold focus:outline-none focus:border-primary appearance-none cursor-pointer">
                                                <option value="EN">English (Global)</option><option value="BN">Bangla (Regional)</option>
                                            </select>
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none opacity-40"><Icon name="chevron-down" size={14} /></div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            {['Male 1', 'Male 2', 'Female 1', 'Female 2'].map((v) => (
                                                <button key={v} onClick={() => setVoice(v)} className={`py-3 px-4 rounded-xl text-[11px] font-bold border transition-solid ${voice === v ? 'bg-primary/10 border-primary text-primary shadow-lg shadow-primary/10' : 'bg-zinc-900/50 border-white/5 text-zinc-500 hover:border-white/20'}`}>{v}</button>
                                            ))}
                                        </div>
                                    </div>
                                </section>

                                <section className="space-y-6">
                                    <h4 className="text-[10px] font-black text-zinc-600 uppercase tracking-[0.3em] flex items-center gap-2"><Icon name="settings-2" size={12} /> Sound Profile</h4>
                                    <div className="space-y-2">
                                        <ControlSlider label="Speed Rate" icon="zap" value={speed} min={0.5} max={2.0} step={0.1} onChange={setSpeed} />
                                        <ControlSlider label="Voice Pitch" icon="activity" value={pitch} min={0.5} max={1.5} step={0.1} onChange={setPitch} />
                                        <ControlSlider label="Gain Level" icon="volume-2" value={volume} min={0} max={1.0} step={0.01} onChange={setVolume} />
                                    </div>
                                </section>

                                <button disabled={isGenerating || (!text.trim() && !batchMode)} onClick={handleGenerate}
                                    className={`w-full py-5 rounded-2xl font-black text-sm tracking-widest uppercase transition-solid relative overflow-hidden shadow-2xl button-glow ${isGenerating ? 'bg-zinc-800 text-zinc-600 cursor-not-allowed' : 'bg-primary text-white hover:bg-primary-light active:scale-[0.98]'}`}>
                                    {isGenerating ? <div className="flex items-center justify-center gap-3"><div className="w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin" /> Rendering</div> : <div className="flex items-center justify-center gap-3"><Icon name="play" size={18} fill="currentColor" /> Generate Audio</div>}
                                    {isGenerating && <div className="absolute bottom-0 left-0 h-1 bg-white/40 transition-solid duration-300" style={{ width: `${progress}%` }} />}
                                </button>
                            </div>
                        </div>

                        {/* Master Player */}
                        <div className="h-28 border-t border-white/5 flex items-center px-12 gap-12 bg-surface/40 backdrop-blur-2xl z-20">
                            <div className="flex items-center gap-5 w-80">
                                <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-primary to-indigo-600 flex items-center justify-center text-white shadow-xl shadow-primary/20"><Icon name="waveform" size={28} /></div>
                                <div className="min-w-0"><h4 className="text-sm font-black text-white line-clamp-1 truncate uppercase tracking-wider">{fileName}</h4><p className="text-[10px] font-bold text-zinc-500 uppercase tracking-[0.2em]">{voice} Engine • {language}</p></div>
                            </div>
                            
                            <div className="flex-1 flex flex-col items-center gap-3">
                                <div className="flex items-center gap-10">
                                    <button onClick={() => {synth.cancel(); setIsPlaying(false);}} className="text-zinc-600 hover:text-white transition-solid"><Icon name="rotate-ccw" size={20} /></button>
                                    <button onClick={handlePlayPause} className="w-14 h-14 rounded-full bg-white text-background flex items-center justify-center hover:scale-110 active:scale-95 transition-solid shadow-2xl shadow-white/10">{isPlaying ? <Icon name="pause" size={24} fill="currentColor" /> : <Icon name="play" size={24} className="ml-1" fill="currentColor" />}</button>
                                    <button className="text-zinc-600 hover:text-white transition-solid"><Icon name="share-2" size={20} /></button>
                                </div>
                                <div className="w-full max-w-2xl flex items-center gap-6">
                                    <span className="text-[9px] font-bold font-mono text-zinc-600 w-12 text-right tracking-widest">LIVE</span>
                                    <div className="flex-1 h-1.5 bg-zinc-900 rounded-full relative group">
                                        <div className={`absolute top-0 left-0 h-full bg-primary rounded-full ${isPlaying ? 'pulse-slow' : ''} shadow-[0_0_15px_rgba(99,102,241,0.5)]`} style={{ width: isPlaying ? '100%' : '0%' }} />
                                    </div>
                                    <span className="text-[9px] font-bold font-mono text-primary w-12 tracking-widest">STUDIO</span>
                                </div>
                            </div>

                            <div className="w-80 flex items-center justify-end gap-4">
                                <button className="px-8 py-3.5 rounded-xl bg-zinc-900 text-white text-[11px] font-black uppercase tracking-[0.2em] transition-solid border border-white/5 hover:border-primary/40 flex items-center gap-3"><Icon name="download-cloud" size={18} /> Export</button>
                            </div>
                        </div>
                    </main>

                    {/* Notification Toast */}
                    {showSuccess && (
                        <div className="fixed bottom-32 left-1/2 -translate-x-1/2 bg-primary px-8 py-4 rounded-[20px] flex items-center gap-4 shadow-2xl shadow-primary/40 z-50 fade-in border border-white/20">
                            <div className="w-6 h-6 rounded-full bg-white flex items-center justify-center text-primary"><Icon name="check" size={14} /></div>
                            <span className="text-xs font-black text-white uppercase tracking-widest">Mastering Complete</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
